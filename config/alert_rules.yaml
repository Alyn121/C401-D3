alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 5000 for 30m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: cost_budget_spike
    severity: P2
    condition: hourly_cost_usd > 2x_baseline for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
  - name: low_grading_quality
    severity: P3
    condition: quality_avg < 0.7 for 10m
    type: symptom-based
    owner: content-team
    runbook: docs/alerts.md#4-low-grading-quality
  - name: vector_store_fail
    severity: P1
    condition: error_type == "RuntimeError" for 1m
    type: incident-based
    owner: dev-ops
    runbook: docs/alerts.md#5-vector-store-fail
